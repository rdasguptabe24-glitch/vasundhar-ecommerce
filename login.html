<!DOCTYPE html>
<html lang="en">

<head>
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header>

    <div class="logo">
            <a href="index.html">
                <img src="images/VASUNDHARA.jpeg" alt="Vasundhara Logo">
            </a>
        </div>

        <nav>

            <ul>

                <li><a href="index.html">Home</a></li>

                <li><a href="shop.html">Shop</a></li>

                <li><a href="#">Categories</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="contact.html">Contact</a></li>

                <li>
    <a href="login.html" id="loginLink">Login</a>
</li>

                <li><a href="cart.html">🛒 Cart</a></li>

            </ul>

        </nav>

</header>

<main class="login-page">

    <div class="login-left">
        <img src="images/hero.jpg" alt="Vasundhara">
        <div class="login-image-overlay">
            <h1>Welcome Back</h1>
            <p>
                Discover timeless elegance crafted with love,
                tradition and luxury.
            </p>
        </div>
    </div>

    <div class="login-right">

        <div class="login-card">

            <span class="login-subtitle">
                VASUNDHARA
            </span>

            <h2>Sign In</h2>

            <p class="login-text">
                Login to continue shopping premium ethnic collections.
            </p>

            <form id="loginForm">

                <div class="input-group">
                    <label>Email Address</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input
                        type="password"
                        id="password"
                        placeholder="Enter your password"
                        required>
                </div>

                <div class="login-options">
                    <label>
                        <input type="checkbox">
                        Remember me
                    </label>

                    <a href="#">
                        Forgot Password?
                    </a>
                </div>

                <button class="login-btn" type="submit">
                    Login
                </button>

            </form>

            <p class="signup-link">
                Don't have an account?

                <a href="signup.html">
                    Create Account
                </a>
            </p>

        </div>

    </div>

</main>

<script src="js/login.js"></script>

</body>
</html>

</body>

</html>
