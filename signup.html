<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="logo">
        <a href="index.html">
            <img src="images/VASUNDHARA.jpeg" alt="Vasundhara Logo">
        </a>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li>
    <a href="login.html" id="loginLink">Login</a>
</li>
        </ul>
    </nav>

</header>

<main class="login-container">

    <h1>Create Account</h1>

    <form id="signupForm">

        <input
            type="text"
            id="name"
            placeholder="Full Name"
            required>

        <br><br>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <br><br>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <br><br>

        <button type="submit">
            Sign Up
        </button>

    </form>

    <br>

    <p>
        Already have an account?
        <a href="login.html">Login</a>
    </p>

</main>

<script src="js/signup.js"></script>

</body>
</html>
